<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Sri Lanka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Sinhala', sans-serif; }
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1627552245715-77d79b9a528a?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }
    </style>
</head>
<body class="text-white">

    <div class="hero flex flex-col w-full h-screen">
        <nav class="flex justify-between items-center p-8 px-12 border-b border-white/10">
            <h1 class="text-3xl font-bold tracking-tighter">Travel.</h1>
            <div class="flex gap-6 text-sm font-bold">
                <a href="#" class="hover:text-emerald-400">Home</a>
                <a href="#" class="hover:text-emerald-400">About</a>
                <a href="#" class="hover:text-emerald-400">සංචාරක ස්ථාන</a>
                <a href="#" class="hover:text-emerald-400">ආහාර පාන</a>
                <a href="#" class="hover:text-emerald-400">සංස්කෘතික උත්සව</a>
                <a href="#" class="hover:text-emerald-400">හොටෙල්</a>
            </div>
        </nav>

        <div class="flex-grow flex flex-col justify-center px-12 max-w-5xl">
            <h2 class="text-emerald-400 font-bold text-xl mb-2 tracking-widest">#VISIT</h2>
            <h1 class="text-8xl font-black mb-6">SRI LANKA</h1>
            <p class="text-lg text-gray-300 mb-8 leading-relaxed max-w-2xl">
                ශ්‍රී ලංකාව යනු ඉන්දියන් සාගරයේ පිහිටි දූපත් රාජ්‍යයකි. ලස්සන වෙරළ තීරයන්, පුරාණ විහාරස්ථාන සහ මනරම් ස්වභාවික දර්ශනවලින් සමන්විත මෙම දේශය සංචාරකයන්ගේ පාරාදීසයකි.
            </p>
            <button class="bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-emerald-400 transition w-48">
                ගවේෂණය කරන්න
            </button>
        </div>
    </div>

</body>
</html>
