<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel | Visit Sri Lanka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Sinhala', sans-serif; background: #000; color: white; margin: 0; }
        .hero-bg {
            /* මෙතන පින්තූරේ ලින්ක් එක */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1596548458907-8898166c303f?q=80&w=2070');
            background-size: cover;
            background-position: center;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div class="hero-bg flex flex-col">
        <nav class="flex justify-between items-center p-8 px-16">
            <div class="text-3xl font-bold">Travel.</div>
            <div class="flex space-x-6 text-sm font-bold">
                <a href="#" class="hover:text-emerald-400">Home</a>
                <a href="#" class="hover:text-emerald-400">Adventure</a>
                <a href="#" class="hover:text-emerald-400">Map</a>
                <a href="#" class="hover:text-emerald-400">සංචාරක ස්ථාන</a>
                <a href="#" class="hover:text-emerald-400">ආහාර පාන</a>
                <a href="#" class="hover:text-emerald-400">About Us</a>
                <a href="#">🔍</a>
            </div>
        </nav>

        <div class="flex-grow flex flex-col justify-center px-16 max-w-4xl">
            <h2 class="text-emerald-400 font-bold text-xl mb-2">#VISIT</h2>
            <h1 class="text-8xl font-black mb-6">SRI LANKA</h1>
            <p class="text-lg text-gray-200 mb-8 leading-relaxed">
                ශ්‍රී ලංකාව යනු ඉන්දියන් සාගරයේ පිහිටි දූපත් රාජ්‍යයකි. ලස්සන වෙරළ තීරයන්, පුරාණ විහාරස්ථාන සහ මනරම් ස්වභාවික දර්ශනවලින් සමන්විත මෙම දේශය සංචාරකයන්ගේ පාරාදීසයකි.
            </p>
            <button class="bg-emerald-600 hover:bg-emerald-700 text-white w-40 py-3 rounded-full font-bold transition">
                ගවේෂණය කරන්න
            </button>
        </div>
    </div>

</body>
</html>
